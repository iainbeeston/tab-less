version: 2
jobs:
   build:
     docker:
       - image: cimg/node:22.17

     environment:
       # Always use sharp's prebuilt binary; never build from a global libvips.
       SHARP_IGNORE_GLOBAL_LIBVIPS: "1"

     steps:
       - checkout

       - restore_cache:
           key: dependencies-v1-{{ checksum "package-lock.json" }}

       - run:
           command: npm ci

       - save_cache:
           key: dependencies-v1-{{ checksum "package-lock.json" }}
           paths:
             - ~/.npm

       - run:
           command: npm run lint

       - run:
           command: npm run compile

       - run:
           command: npm test

       - run:
           command: npm run build
